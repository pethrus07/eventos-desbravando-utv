/* ============================================================
   TAREFAS GERAIS (ambos os papéis)
   ============================================================ */
var TA = [];
var TFILT = { q:"", status:"", prio:"", resp:"", setor:"" };

function telaTarefas(){
  $("head").innerHTML =
    '<h1 class="anton">Tarefas gerais</h1>' +
    '<p style="color:var(--mut);font-size:14px;margin-top:8px">O que precisa acontecer fora dos eventos — do dia a dia da operação.</p>' +
    navAreas("#/tarefas");
  ligarNav();
  $("main").innerHTML = '<p style="color:var(--dim)">Carregando…</p>';
  api("/api/tarefas").then(function(j){
    TA = j.tarefas || []; renderTarefas();
    pollTimer = setInterval(function(){
      if (document.visibilityState !== "visible") return;
      if ($("overlay").classList.contains("on")) return;
      var ae = document.activeElement;
      if (ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName)) return;
      api("/api/tarefas").then(function(nj){ TA = nj.tarefas||[]; renderTarefas(); }).catch(function(){});
    }, 25000);
  }).catch(function(e){ $("main").innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; });
}

function tUniques(campo){
  var set = {};
  TA.forEach(function(t){ var v = String(t[campo]||"").trim(); if(v) set[v]=1; });
  return Object.keys(set).sort();
}

function renderTarefas(){
  var tot=TA.length, done=0, and=0, hoje=0;
  TA.forEach(function(t){
    if (t.status==="concluido") done++;
    if (t.status==="andamento") and++;
    if (t.status!=="concluido" && (t.data_limite||"").toLowerCase()==="hoje") hoje++;
  });
  var pct = tot ? Math.round(done/tot*100) : 0;
  var resps = tUniques("responsavel"), setores = tUniques("setor");
  function opts(list, sel){
    return list.map(function(v){ return '<option value="'+esc(v)+'"'+(v===sel?' selected':'')+'>'+esc(v)+'</option>'; }).join("");
  }
  var q = TFILT.q.toLowerCase();
  var lista = TA.filter(function(t){
    if (TFILT.status && t.status !== TFILT.status) return false;
    if (TFILT.prio && String(t.prioridade==null?"":t.prioridade) !== TFILT.prio) return false;
    if (TFILT.resp && t.responsavel !== TFILT.resp) return false;
    if (TFILT.setor && t.setor !== TFILT.setor) return false;
    if (q && (t.titulo+" "+t.setor+" "+t.responsavel+" "+t.observacoes).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  var temFiltro = TFILT.q||TFILT.status||TFILT.prio||TFILT.resp||TFILT.setor;

  var html =
    '<div class="kpis">' +
      '<div class="kpi"><small>Tarefas</small><b>'+tot+'</b></div>' +
      '<div class="kpi"><small>Concluídas</small><b class="ok">'+done+' ('+pct+'%)</b></div>' +
      '<div class="kpi"><small>Em andamento</small><b class="warn">'+and+'</b></div>' +
      '<div class="kpi"><small>Para hoje</small><b class="'+(hoje?'bad':'')+'">'+hoje+'</b></div>' +
    '</div>' +
    '<div class="filters">' +
      '<input class="full" id="t_q" placeholder="Buscar tarefa, responsável, setor…" value="'+esc(TFILT.q)+'">' +
      '<select id="t_status"><option value="">Todos os status</option>' +
        ['afazer','andamento','concluido'].map(function(st){
          return '<option value="'+st+'"'+(TFILT.status===st?' selected':'')+'>'+STATUS_TXT[st]+'</option>'; }).join("") +
      '</select>' +
      '<select id="t_prio"><option value="">Toda prioridade</option>' +
        [0,1,2,3,4].map(function(p){ return '<option value="'+p+'"'+(TFILT.prio===String(p)?' selected':'')+'>P'+p+'</option>'; }).join("") +
      '</select>' +
      (resps.length>1 ? '<select id="t_resp"><option value="">Todos os responsáveis</option>'+opts(resps,TFILT.resp)+'</select>' : '') +
      (setores.length>1 ? '<select id="t_setor"><option value="">Todos os setores</option>'+opts(setores,TFILT.setor)+'</select>' : '') +
    '</div>' +
    (temFiltro ? '<div class="fclear"><button class="link" id="t_clear">Limpar filtros</button></div>' : '');

  if (!TA.length) html += '<div class="empty">Nenhuma tarefa ainda. Adicione a primeira abaixo.</div>';
  else if (!lista.length) html += '<div class="empty">Nenhuma tarefa com esses filtros.</div>';

  lista.forEach(function(t){
    var sub = [];
    if (t.setor) sub.push(esc(t.setor));
    if (t.responsavel) sub.push(esc(t.responsavel));
    if (t.data_limite) sub.push((t.data_limite.toLowerCase()==="hoje"?'<span style="color:var(--warn);font-weight:600">Hoje</span>':"até "+esc(t.data_limite)));
    if (t.observacoes) sub.push(esc(t.observacoes.length>60 ? t.observacoes.slice(0,60)+"…" : t.observacoes));
    var check = t.status==="concluido" ? "✓" : "";
    html += '<div class="row st-'+t.status+'" data-tedit="'+t.id+'" role="button" tabindex="0">' +
      '<button class="stbtn" data-tst="'+t.id+'" title="'+STATUS_TXT[t.status]+' — toque para mudar" aria-label="Mudar status: '+STATUS_TXT[t.status]+'">'+check+'</button>' +
      '<div class="info"><div class="nm">'+esc(t.titulo)+'</div>' +
      (sub.length?'<div class="sub"><span>'+sub.join("</span><span>")+'</span></div>':'') +
      '</div>' +
      (t.prioridade!=null ? '<span class="pbadge'+(t.prioridade<=1?' p1':'')+'">P'+t.prioridade+'</span>' : '') +
      '</div>';
  });
  html += '<button class="btn" id="t_add" style="width:100%;margin-top:14px">+ Nova tarefa</button>';
  $("main").innerHTML = html;

  $("t_q").oninput = debounce(function(){ TFILT.q = this.value; renderTarefas(); }, 250);
  ["status","prio","resp","setor"].forEach(function(f){
    var el = $("t_"+f); if(!el) return;
    el.onchange = function(){ TFILT[f] = this.value; renderTarefas(); };
  });
  var tc = $("t_clear");
  if (tc) tc.onclick = function(){ TFILT = {q:"",status:"",prio:"",resp:"",setor:""}; renderTarefas(); };
  Array.prototype.forEach.call(document.querySelectorAll("[data-tst]"), function(b){
    b.onclick = function(ev){ ev.stopPropagation(); cicloTarefa(+b.getAttribute("data-tst")); };
  });
  Array.prototype.forEach.call(document.querySelectorAll("[data-tedit]"), function(r){
    var abrir = function(){ sheetTarefa(+r.getAttribute("data-tedit")); };
    r.onclick = abrir;
    r.onkeydown = function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); abrir(); } };
  });
  $("t_add").onclick = function(){ sheetTarefa(null); };
}

function cicloTarefa(id){
  var t = TA.find(function(x){ return x.id===id; });
  if (!t) return;
  var novo = STATUS_SEQ[t.status] || "afazer";
  var antigo = t.status;
  t.status = novo; renderTarefas();
  api("/api/tarefas/"+id, "PATCH", { status: novo, atualizado_por: NOME })
    .catch(function(){ t.status = antigo; renderTarefas();
      toast("Sem conexão — o status não foi salvo. Tente de novo.", true); });
}

function sheetTarefa(id){
  var t = id ? TA.find(function(x){ return x.id===id; }) : null;
  var novo = !t;
  t = t || { titulo:"", setor:"", status:"afazer", prioridade:"", data_limite:"", responsavel:"", observacoes:"" };
  abrirSheet(
    '<h2 class="anton">'+(novo?'Nova tarefa':'Editar tarefa')+'</h2>' +
    (!novo && t.atualizado_por ? '<div class="meta">Última alteração: '+esc(t.atualizado_por)+' · '+fmtData(t.atualizado_em)+'</div>' : '') +
    '<label class="top" for="tf_tit">Tarefa *</label>' +
    '<input id="tf_tit" maxlength="300" value="'+esc(t.titulo)+'" placeholder="ex.: Precificar expedição Tavares">' +
    '<div class="grid2">' +
      '<div><label class="top">Setor</label><input id="tf_setor" list="dl_tsetores" maxlength="80" value="'+esc(t.setor)+'" placeholder="Expedição, Vestuário…"></div>' +
      '<div><label class="top">Responsável</label><input id="tf_resp" list="dl_tresps" maxlength="60" value="'+esc(t.responsavel)+'" placeholder="ex.: Pedrinho"></div>' +
      '<div><label class="top">Status</label><select id="tf_st">' +
        ['afazer','andamento','concluido'].map(function(st){
          return '<option value="'+st+'"'+(t.status===st?' selected':'')+'>'+STATUS_TXT[st]+'</option>'; }).join("") +
      '</select></div>' +
      '<div><label class="top">Prioridade</label><select id="tf_prio"><option value="">—</option>' +
        [0,1,2,3,4].map(function(p){ return '<option value="'+p+'"'+(t.prioridade===p?' selected':'')+'>P'+p+'</option>'; }).join("") +
      '</select></div>' +
    '</div>' +
    '<label class="top">Data limite</label>' +
    '<input id="tf_dl" maxlength="20" value="'+esc(t.data_limite)+'" placeholder="Hoje, 05/07…">' +
    '<label class="top">Observações</label>' +
    '<textarea id="tf_obs" maxlength="600">'+esc(t.observacoes)+'</textarea>' +
    '<datalist id="dl_tsetores">'+tUniques("setor").map(function(v){return '<option value="'+esc(v)+'">';}).join("")+'</datalist>' +
    '<datalist id="dl_tresps">'+tUniques("responsavel").map(function(v){return '<option value="'+esc(v)+'">';}).join("")+'</datalist>' +
    '<div class="actions">' +
      (novo ? '<button class="btn2" data-close>Cancelar</button>' : '<button class="btn-danger" id="tf_del">Excluir</button>') +
      '<button class="btn" id="tf_save">'+(novo?'Adicionar':'Salvar')+'</button>' +
    '</div>'
  );
  $("tf_save").onclick = function(){
    var body = {
      titulo: $("tf_tit").value.trim(), setor: $("tf_setor").value.trim(),
      status: $("tf_st").value, prioridade: $("tf_prio").value===""?null:+$("tf_prio").value,
      data_limite: $("tf_dl").value.trim(), responsavel: $("tf_resp").value.trim(),
      observacoes: $("tf_obs").value.trim(), atualizado_por: NOME
    };
    if (!body.titulo) return toast("O título é obrigatório", true);
    $("tf_save").disabled = true;
    var p = novo ? api("/api/tarefas","POST",body) : api("/api/tarefas/"+id,"PATCH",body);
    p.then(function(){ fecharSheet(); toast(novo?"Tarefa adicionada":"Salvo");
      return api("/api/tarefas").then(function(j){ TA=j.tarefas||[]; renderTarefas(); }); })
     .catch(function(e){ $("tf_save").disabled=false; toast(e.message,true); });
  };
  var del = $("tf_del");
  if (del) del.onclick = function(){
    if (!confirm("Excluir esta tarefa? Não dá para desfazer.")) return;
    api("/api/tarefas/"+id,"DELETE").then(function(){ fecharSheet(); toast("Tarefa excluída");
      return api("/api/tarefas").then(function(j){ TA=j.tarefas||[]; renderTarefas(); }); })
      .catch(function(e){ toast(e.message,true); });
  };
  setTimeout(function(){ $("tf_tit").focus(); }, 50);
}

/* ============================================================
   MINI CRM (admin)
   ============================================================ */
var CRM = [];
var CRMFILT = { q:"", etapa:"", pend:false };
var ETAPAS = [["lead","Lead"],["contato","Em contato"],["proposta","Proposta"],["confirmado","Confirmado"],["pos_evento","Pós-evento"],["perdido","Perdido"]];
var ETAPA_TXT = {}; ETAPAS.forEach(function(e){ ETAPA_TXT[e[0]] = e[1]; });
var ETAPA_CLS = { lead:"", contato:"", proposta:"warn", confirmado:"ok", pos_evento:"ok", perdido:"bad" };

function telaCRM(){
  $("head").innerHTML =
    '<h1 class="anton">CRM · Clientes</h1>' +
    '<p style="color:var(--mut);font-size:14px;margin-top:8px">Acompanhamento de cada cliente: etapa, próxima ação e histórico de conversas.</p>' +
    navAreas("#/crm");
  ligarNav();
  if (PAPEL !== "admin"){
    $("main").innerHTML = '<div class="empty">O CRM é visível apenas com a chave admin.</div>';
    return;
  }
  $("main").innerHTML = '<p style="color:var(--dim)">Carregando…</p>';
  api("/api/crm").then(function(j){ CRM = j.contatos || []; renderCRM(); })
    .catch(function(e){ $("main").innerHTML = '<div class="empty">'+esc(e.message)+'</div>'; });
}

function renderCRM(){
  var porEtapa = {}, valorAtivo = 0, comPend = 0;
  CRM.forEach(function(c){
    porEtapa[c.etapa] = (porEtapa[c.etapa]||0)+1;
    if (c.etapa!=="perdido" && c.valor_potencial) valorAtivo += c.valor_potencial;
    if (pendencias(c, OBRIG_CRM).length) comPend++;
  });
  var q = CRMFILT.q.toLowerCase();
  var lista = CRM.filter(function(c){
    if (CRMFILT.etapa && c.etapa !== CRMFILT.etapa) return false;
    if (CRMFILT.pend && !pendencias(c, OBRIG_CRM).length) return false;
    if (q && (c.nome+" "+c.grupo+" "+c.telefone+" "+c.interesse+" "+c.cidade+" "+c.observacoes).toLowerCase().indexOf(q)<0) return false;
    return true;
  });

  var html =
    '<div class="kpis">' +
      '<div class="kpi"><small>Contatos</small><b>'+CRM.length+'</b></div>' +
      '<div class="kpi"><small>Confirmados</small><b class="ok">'+(porEtapa.confirmado||0)+'</b></div>' +
      '<div class="kpi"><small>Em negociação</small><b class="warn">'+((porEtapa.lead||0)+(porEtapa.contato||0)+(porEtapa.proposta||0))+'</b></div>' +
      '<div class="kpi"><small>Valor em carteira</small><b>'+brl(valorAtivo)+'</b></div>' +
      '<div class="kpi"><small>Com pendências</small><b class="'+(comPend?'bad':'ok')+'">'+comPend+'</b></div>' +
    '</div>' +
    '<div class="tabs">' +
      '<button class="tab'+(CRMFILT.etapa===""?' on':'')+'" data-etapa="">Todos ('+CRM.length+')</button>' +
      ETAPAS.map(function(e){
        var n = porEtapa[e[0]]||0; if(!n) return "";
        return '<button class="tab'+(CRMFILT.etapa===e[0]?' on':'')+'" data-etapa="'+e[0]+'">'+e[1]+' ('+n+')</button>';
      }).join("") +
      '<button class="tab'+(CRMFILT.pend?' on':'')+'" data-crmpf="pend">⚠ Pendências ('+comPend+')</button>' +
    '</div>' +
    '<input id="crm_q" placeholder="Buscar nome, grupo, telefone, expedição…" value="'+esc(CRMFILT.q)+'" style="margin-bottom:12px">';

  if (!CRM.length) html += '<div class="empty">Nenhum contato ainda. Adicione o primeiro abaixo.</div>';
  else if (!lista.length) html += '<div class="empty">Nenhum contato com essa busca.</div>';

  lista.forEach(function(c){
    var chips = ['<span class="chip '+(ETAPA_CLS[c.etapa]||"")+'">'+(ETAPA_TXT[c.etapa]||c.etapa)+'</span>'];
    var cfC = chipFalta(c, OBRIG_CRM); if (cfC) chips.push(cfC);
    if (c.grupo && c.grupo!==c.nome) chips.push('<span class="chip">'+esc(c.grupo)+'</span>');
    if (c.telefone) chips.push('<span class="chip">'+esc(c.telefone)+'</span>');
    if (c.camiseta) chips.push('<span class="chip">camiseta '+esc(c.camiseta)+'</span>');
    if (c.participacoes) chips.push('<span class="chip ok">'+c.participacoes+' expedição(ões)</span>');
    if (c.valor_potencial) chips.push('<span class="chip">'+brl(c.valor_potencial)+'</span>');
    if (c.interacoes) chips.push('<span class="chip">'+c.interacoes+' interação(ões)</span>');
    var prox = c.proxima_acao ? '<div style="font-size:12px;color:var(--warn);margin-top:5px">→ '+esc(c.proxima_acao)+(c.proxima_data?' · '+esc(c.proxima_data):'')+'</div>' : '';
    html += '<div class="row" data-crm="'+c.id+'" role="button" tabindex="0">' +
      '<div class="info"><div class="nm">'+esc(c.nome)+'</div>' +
      '<div class="sub" style="margin-top:4px">'+chips.join("")+'</div>' +
      (c.interesse?'<div style="font-size:11.5px;color:var(--dim);margin-top:4px">'+esc(c.interesse)+'</div>':'') +
      prox + '</div></div>';
  });
  html += '<button class="btn" id="crm_add" style="width:100%;margin-top:14px">+ Novo contato</button>';
  $("main").innerHTML = html;

  Array.prototype.forEach.call(document.querySelectorAll("[data-etapa]"), function(b){
    b.onclick = function(){ CRMFILT.etapa = b.getAttribute("data-etapa"); renderCRM(); };
  });
  var crmPf = document.querySelector("[data-crmpf]");
  if (crmPf) crmPf.onclick = function(){ CRMFILT.pend = !CRMFILT.pend; renderCRM(); };
  $("crm_q").oninput = debounce(function(){ CRMFILT.q = this.value; renderCRM(); }, 200);
  Array.prototype.forEach.call(document.querySelectorAll("[data-crm]"), function(r){
    var abrir = function(){ sheetContato(+r.getAttribute("data-crm")); };
    r.onclick = abrir;
    r.onkeydown = function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); abrir(); } };
  });
  $("crm_add").onclick = function(){ sheetContato(null); };
}

function sheetContato(id){
  var novo = !id;
  var render = function(c, ints, parts){
    parts = parts || [];
    abrirSheet(
      '<h2 class="anton">'+(novo?'Novo contato':'Editar contato')+'</h2>' +
      (!novo && c.atualizado_por ? '<div class="meta">Última alteração: '+esc(c.atualizado_por)+' · '+fmtData(c.atualizado_em)+'</div>' : '') +
      (novo ? '' : avisoFalta(c, OBRIG_CRM)) +
      '<label class="top">Nome *</label><input id="cr_nome" maxlength="150" value="'+esc(c.nome)+'">' +
      '<div class="grid2">' +
        '<div><label class="top">Grupo / apelido</label><input id="cr_grupo" maxlength="80" value="'+esc(c.grupo)+'" placeholder="ex.: Zana"></div>' +
        '<div><label class="top">Telefone</label><input id="cr_tel" maxlength="25" value="'+esc(c.telefone)+'"></div>' +
        '<div><label class="top">Etapa</label><select id="cr_etapa">' +
          ETAPAS.map(function(e){ return '<option value="'+e[0]+'"'+(c.etapa===e[0]?' selected':'')+'>'+e[1]+'</option>'; }).join("") +
        '</select></div>' +
        '<div><label class="top">Valor potencial (R$)</label><input id="cr_valor" inputmode="decimal" value="'+(c.valor_potencial!=null?esc(String(c.valor_potencial).replace(".",",")):"")+'" placeholder="9500,00"></div>' +
        '<div><label class="top">Camiseta</label><input id="cr_cam" maxlength="10" value="'+esc(c.camiseta||"")+'" placeholder="P, M, G, GG…"></div>' +
        '<div><label class="top">CPF</label><input id="cr_cpf" maxlength="20" value="'+esc(c.cpf||"")+'"></div>' +
        '<div><label class="top">Cidade</label><input id="cr_cidade" maxlength="80" value="'+esc(c.cidade)+'"></div>' +
        '<div><label class="top">Origem</label><input id="cr_origem" maxlength="80" value="'+esc(c.origem)+'" placeholder="indicação, instagram…"></div>' +
      '</div>' +
      '<label class="top">Expedição(ões) de interesse</label>' +
      '<input id="cr_int" maxlength="200" value="'+esc(c.interesse)+'" placeholder="ex.: Costa Doce · Dezembro">' +
      '<div class="grid2">' +
        '<div><label class="top">Próxima ação</label><input id="cr_prox" maxlength="200" value="'+esc(c.proxima_acao)+'" placeholder="ex.: Cobrar saldo"></div>' +
        '<div><label class="top">Quando</label><input id="cr_proxd" maxlength="20" value="'+esc(c.proxima_data)+'" placeholder="ex.: 05/07"></div>' +
      '</div>' +
      '<label class="top">Observações</label><textarea id="cr_obs" maxlength="600">'+esc(c.observacoes)+'</textarea>' +
      (!novo ?
        '<label class="top" style="margin-top:20px">Expedições (participou / vai participar)</label>' +
        '<div>'+(parts.length ? parts.map(function(p){
          var pago = p.pago||0, pac = p.pacote;
          var pct = pac ? Math.min(100, Math.round(pago/pac*100)) : 0;
          var st = pac==null ? '<span class="chip">sem pacote</span>'
                 : (pago>=pac ? '<span class="chip ok">pago</span>'
                 : (pago>0 ? '<span class="chip warn">'+pct+'% pago</span>' : '<span class="chip bad">a receber</span>'));
          return '<button class="row" data-partev="'+p.evento_id+'" style="margin-bottom:6px">' +
            '<div class="info"><div class="nm" style="font-size:14px">'+esc(p.evento)+(p.arquivado?' <span style="color:var(--dim);font-weight:400">(arquivado)</span>':'')+'</div>' +
            '<div class="sub" style="margin-top:3px">'+st+
            (p.camiseta?'<span class="chip">camiseta '+esc(p.camiseta)+'</span>':'')+
            (p.utv?'<span class="chip">UTV '+esc(p.utv)+'</span>':'')+
            (pac!=null?'<span>'+brl(pago)+' de '+brl(pac)+'</span>':'')+'</div>' +
            '</div></button>';
        }).join("") : '<div style="font-size:13px;color:var(--dim);padding:4px 0">Nenhuma expedição vinculada. Vincule pela ficha do participante dentro do evento.</div>')+'</div>' +
        '<label class="top" style="margin-top:20px">Histórico de interações</label>' +
        '<div>'+(ints.length ? ints.map(function(p){
          return '<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mut);border-bottom:1px solid #1d1d1d;padding:6px 0">' +
            '<span style="flex:1">'+(p.data?esc(p.data)+' · ':'')+(p.canal?esc(p.canal)+' · ':'')+esc(p.resumo)+
            (p.criado_por?' <span style="color:var(--dim)">('+esc(p.criado_por)+')</span>':'')+'</span>' +
            '<button class="delx" data-intdel="'+p.id+'" title="Remover interação">×</button></div>';
        }).join("") : '<div style="font-size:13px;color:var(--dim);padding:4px 0">Nenhuma interação registrada.</div>')+'</div>' +
        '<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">' +
          '<input id="in_data" class="mini" placeholder="Data" style="flex:0.7;min-width:70px">' +
          '<input id="in_canal" class="mini" placeholder="Canal" style="flex:0.8;min-width:80px">' +
          '<input id="in_resumo" class="mini" placeholder="O que foi conversado" style="flex:2;min-width:150px">' +
          '<button class="btn2" id="in_add" style="padding:8px 14px">+</button>' +
        '</div>'
      : '') +
      '<div class="actions">' +
        (novo ? '<button class="btn2" data-close>Cancelar</button>' : '<button class="btn-danger" id="cr_del">Excluir</button>') +
        '<button class="btn" id="cr_save">'+(novo?'Adicionar':'Salvar')+'</button>' +
      '</div>'
    );
    $("cr_save").onclick = function(){
      var body = {
        nome: $("cr_nome").value.trim(), grupo: $("cr_grupo").value.trim(),
        telefone: $("cr_tel").value.trim(), etapa: $("cr_etapa").value,
        camiseta: $("cr_cam").value.trim(), cpf: $("cr_cpf").value.trim(),
        valor_potencial: parseMoeda($("cr_valor").value),
        cidade: $("cr_cidade").value.trim(), origem: $("cr_origem").value.trim(),
        interesse: $("cr_int").value.trim(),
        proxima_acao: $("cr_prox").value.trim(), proxima_data: $("cr_proxd").value.trim(),
        observacoes: $("cr_obs").value.trim(), atualizado_por: NOME
      };
      if (!body.nome) return toast("O nome é obrigatório", true);
      $("cr_save").disabled = true;
      var p = novo ? api("/api/crm","POST",body) : api("/api/crm/"+id,"PATCH",body);
      p.then(function(){ CRMLIST = null; fecharSheet(); toast(novo?"Contato adicionado":"Salvo"); telaCRM(); })
       .catch(function(e){ $("cr_save").disabled=false; toast(e.message,true); });
    };
    var del = $("cr_del");
    if (del) del.onclick = function(){
      if (!confirm("Excluir "+c.nome+"? O histórico de interações também será removido.")) return;
      api("/api/crm/"+id,"DELETE").then(function(){ CRMLIST = null; fecharSheet(); toast("Excluído"); telaCRM(); })
        .catch(function(e){ toast(e.message,true); });
    };
    Array.prototype.forEach.call(document.querySelectorAll("[data-partev]"), function(b){
      b.onclick = function(){ fecharSheet(); location.hash = "#/e/"+b.getAttribute("data-partev")+"/participantes"; };
    });
    var ia = $("in_add");
    if (ia) ia.onclick = function(){
      var resumo = $("in_resumo").value.trim();
      if (!resumo) return toast("Descreva a interação", true);
      api("/api/crm/"+id+"/interacoes","POST",{
        data:$("in_data").value.trim(), canal:$("in_canal").value.trim(), resumo:resumo, criado_por:NOME
      }).then(function(){ toast("Interação registrada"); sheetContato(id); })
        .catch(function(e){ toast(e.message,true); });
    };
    Array.prototype.forEach.call(document.querySelectorAll("[data-intdel]"), function(b){
      b.onclick = function(){
        if (!confirm("Remover esta interação?")) return;
        api("/api/crm-interacoes/"+b.getAttribute("data-intdel"),"DELETE")
          .then(function(){ toast("Removida"); sheetContato(id); })
          .catch(function(e){ toast(e.message,true); });
      };
    });
    setTimeout(function(){ $("cr_nome").focus(); }, 50);
  };
  if (novo) render({nome:"",grupo:"",telefone:"",cpf:"",camiseta:"",cidade:"",origem:"",etapa:"lead",interesse:"",
                    valor_potencial:null,proxima_acao:"",proxima_data:"",observacoes:""}, [], []);
  else api("/api/crm/"+id).then(function(j){ render(j.contato, j.interacoes||[], j.participacoes||[]); })
        .catch(function(e){ toast(e.message,true); });
}

/* ============================================================
   Sheet / overlay
   ============================================================ */
function abrirSheet(html){
  $("sheet").innerHTML = html;
  $("overlay").classList.add("on");
  Array.prototype.forEach.call(document.querySelectorAll("[data-close]"), function(b){
    b.onclick = fecharSheet;
  });
}
function fecharSheet(){ $("overlay").classList.remove("on"); $("sheet").innerHTML=""; }
$("overlay").addEventListener("click", function(e){ if (e.target === this) fecharSheet(); });
document.addEventListener("keydown", function(e){ if (e.key==="Escape") fecharSheet(); });

function debounce(fn, ms){
  var t; return function(){ var a=arguments, c=this;
    clearTimeout(t); t=setTimeout(function(){ fn.apply(c,a); }, ms); };
}

/* ============================================================
   Boot
   ============================================================ */
if (KEY){
  $("lnome").value = NOME;
  api("/api/me").then(function(me){
    PAPEL = me.papel || "equipe";
    $("app").classList.remove("hide"); route();
  }).catch(function(){ /* logout já tratado no 401 */ 
    $("login").classList.remove("hide");
  });
} else {
  $("login").classList.remove("hide");
  $("lnome").value = NOME;
}
</script>
